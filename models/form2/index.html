<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(25deg, blue, springgreen);
            min-height: 100vh;
        }
        form {
            color: white;
            width: 80%;
            max-width: 620px;
            min-width: 582px;
            padding: 5rem 2rem;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: 0 5px 30px rgba(255,255,255,0.5);
            border-radius: 12px;
            border: 1px solid white;
        }
        h2 {
            color: rgb(146, 251, 251);
            font-size: 2rem;
            font-weight: 800;
            text-shadow: 1px 0 1px rgba(0,0,0,0.2);
        }
        .part {
            display: flex;
            flex-direction: column;
            color: white;
        }
        input, button {
            padding: 1.2rem 0.5rem;
            outline: 1px solid rgb(3, 65, 112);
            border: none;
            border-radius: 5px;
        }
        label {
            color: aqua;
        }
        .buttons{
            margin-top: 1rem;
            display: flex;
            flex-direction: row;
            gap: 1rem;
        }
        button {
            width: 33.33%;
            background: skyblue;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
        }
        button:hover {
            background: rgb(13, 198, 198);
            cursor: pointer;
        }
    </style>
</head>
<body>
     <form id="contact">
        <h2>Form</h2>
        <div class="part">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Name" required>
        </div>
        <div class="part">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="Your email" required>
        </div>
        <div class="part">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Password" required>
        </div>
        <div class="buttons">
            <button type="submit">Send</button>
            <button type="button" id="delete-user">Delete last saved</button>
            <button type="button" id="delete-specific-user">Delete by email</button>
        </div>
       
    </form>
    
</body>
</html>
